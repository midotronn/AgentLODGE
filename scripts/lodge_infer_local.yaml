NAME: FineDance_FineTuneV2_Local
ACCELERATOR: cuda
DEVICE: [0]
SEED_VALUE: 1233
Norm: true
Discriminator: true
DEBUG: false
FineTune: true
TRAIN:
  STAGE: diffusion
  SPLIT: train
  NUM_WORKERS: 0
  BATCH_SIZE: 1
  START_EPOCH: 1
  END_EPOCH: 1
  RESUME: ''
  PRETRAINED: ''
  DATASETS: ['FINEDANCE_139CUT']
  OPTIM:
    TYPE: Adan
    LR: 0.0004
  ABLATION:
    VAE_TYPE: 'no'
    PREDICT_EPSILON: false
EVAL:
  SPLIT: gtest
  BATCH_SIZE: 1
  NUM_WORKERS: 0
TEST:
  TEST_DIR: ''
  CHECKPOINTS: exp/Local_Module/FineDance_FineTuneV2_Local/checkpoints/epoch=299.ckpt
  SPLIT: gtest
  BATCH_SIZE: 1
  NUM_WORKERS: 0
  SAVE_PREDICTIONS: true
  DATASETS: ['FINEDANCE_139CUT']
  FOLDER: ./experiments
model:
  target: modules
  model_type: Local_Module
  condition: music
  latent_dim: [1, 256]
  ff_size: 1024
  num_layers: 9
  num_head: 4
  droupout: 0.1
  activation: gelu
  guidance_scale: 7.5
  guidance_uncondp: 0.1
  diffusion:
    target: dld.models.architectures.diffusion.GaussianDiffusion
    params:
      horizon: ${FINEDANCE.full_seq_len}
      repr_dim: ${FINEDANCE.nfeats}
      schedule: cosine
      n_timestep: 1000
      predict_epsilon: false
      loss_type: l2
      use_p2: false
      cond_drop_prob: 0.25
      guidance_weight: 2
  DanceDecoder:
    target: dld.models.architectures.model.Refine_DanceDecoder
    params:
      nfeats: ${FINEDANCE.nfeats}
      seq_len: ${FINEDANCE.full_seq_len}
      latent_dim: 512
      ff_size: 1024
      num_layers: 8
      num_heads: 8
      dropout: 0.1
      cond_feature_dim: 35
      activation: gelu
  DanceDiscriminator:
    target: dld.models.architectures.model.DanceDiscriminator
    params:
      nfeats: ${FINEDANCE.nfeats}
      seq_len: ${FINEDANCE.full_seq_len}
      latent_dim: 512
      ff_size: 1024
      num_layers: 8
      num_heads: 8
      dropout: 0.1
      cond_feature_dim: 35
      activation: gelu
DEMO:
  MusicDir: data/finedance/music_npynew
  RENDER: false
  use_cached_features: true
LOGGER:
  SACE_CHECKPOINT_EPOCH: 50
  LOG_EVERY_STEPS: 50
  VAL_EVERY_STEPS: 50
  TENSORBOARD: false
  WANDB:
    OFFLINE: true
    PROJECT: null
    RESUME_ID: null
FINEDANCE:
  full_seq_len: 256
  windows: 8
  nfeats: 139
  njoints: 22
  GENRE_NUM: 16
  partial: full
FOLDER: ./experiments
